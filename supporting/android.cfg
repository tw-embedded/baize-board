name = "android"

type = "pvh"

kernel = "/home/root/and-p1/Image"
ramdisk = "/home/root/and-p2/ramdisk-v3.cpio"

memory = 2048
vcpus = 4
cpus = [2, 3, 4, 5]

on_crash = "preserve"
on_reboot = "preserve"

disk = [
    'file:/home/root/and-p2/system.img,xvda,r',
    'file:/home/root/and-p2/vbmeta.img,xvdb,w',
    'file:/home/root/and-p2/vendor.img,xvdc,r',
]

device_tree = "/home/root/and-p1/virtio-gpu.dtb"

iomem = [ "20002,1" ]
irqs = [ 57 ] # 25 + spi offset 32 = 57

extra = "console=hvc0 earlycon=xen root=/dev/ram0 ramdisk_size=131072 rdinit=/init rw androidboot.selinux=permissive androidboot.hardware=generic androidboot.first_stage_console=1 loglevel=8 printk.devkmsg=on cma=512M androidboot.force_normal_boot=1"
# virtio_mmio.device=512@0x20002e00:57
# androidboot.vbmeta.device_tree_node=0

