name = "android"

type = "pvh"

kernel = "/home/root/and-p1/Image"
ramdisk = "/home/root/and-p4/ramdisk-v3.cpio"

memory = 2048
vcpus = 4
cpus = [2, 3, 4, 5]

on_crash = "preserve"
on_reboot = "preserve"

disk = [
    'file:/home/root/and-p4/system.img,xvda,r',
    'file:/home/root/and-p4/vbmeta.img,xvdb,w',
    'file:/home/root/and-p4/vendor.img,xvdc,r',
    'phy:/dev/vdc3,xvdd,w', # data
    'phy:/dev/vdc2,xvde,w', # metadata
    'file:/home/root/and-p4/system_ext.img,xvdf,r',
    'file:/home/root/and-p4/product.img,xvdg,r',
]

device_tree = "/home/root/and-p1/virtio-gpu.dtb"

iomem = [ "20002,1" ]
irqs = [ 57 ] # 25 + spi offset 32 = 57

extra = "console=hvc0 earlycon=xen root=/dev/ram0 ramdisk_size=131072 rdinit=/init rw androidboot.selinux=permissive androidboot.hardware=baize androidboot.first_stage_console=1 loglevel=8 printk.devkmsg=on cma=512M androidboot.force_normal_boot=1 enforcing=0 androidboot.vbmeta.device_state=unlocked androidboot.boot_devices=xvda"
# virtio_mmio.device=512@0x20002e00:57
# androidboot.vbmeta.device_tree_node=0

